<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>IVF Kalkulačka</title>

<style>
:root {
    --primary: #4A7B6F;
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --text: #1C1C1E;
    --secondary-text: #8E8E93;
    --accent-bg: #E5E5EA;
}

/* Dark Mode support */
@media (prefers-color-scheme: dark) {
    :root {
        --bg: #000000;
        --card: #1C1C1E;
        --text: #FFFFFF;
        --secondary-text: #8E8E93;
        --accent-bg: #2C2C2E;
    }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    font-family: -apple-system, system-ui, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 20px 12px;
}

.app-container {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

/* Hlavní karta */
.card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

/* iOS Segmented Control */
.tabs {
    display: flex;
    background: var(--accent-bg);
    border-radius: 12px;
    padding: 2px;
    margin-bottom: 20px;
}

.tab {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 10px;
    background: transparent;
    font-weight: 600;
    font-size: 13px;
    color: var(--secondary-text);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.tab.active {
    background: var(--card);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* Inputy a tlačítka */
input {
    width: 100%;
    height: 50px;
    border-radius: 12px;
    border: none;
    background: var(--accent-bg);
    color: var(--text);
    font-size: 17px;
    text-align: center;
    margin-bottom: 12px;
    font-family: inherit;
    outline: none;
}

.days-grid {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

.day-btn {
    flex: 1;
    height: 44px;
    border-radius: 10px;
    border: none;
    background: var(--accent-bg);
    color: var(--text);
    font-weight: 600;
    transition: transform 0.1s;
}

.day-btn:active { transform: scale(0.95); }

.day-btn.active {
    background: var(--primary);
    color: white;
}

/* Výsledková karta - Apple Health Style */
.result-card {
    background: var(--primary);
    border-radius: 20px;
    padding: 24px;
    color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

.ga-main {
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
    letter-spacing: -2px;
}

.edd-sub {
    font-size: 18px;
    font-weight: 500;
    opacity: 0.95;
    margin-bottom: 15px;
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding-top: 15px;
    border-top: 1px solid rgba(255,255,255,0.2);
    font-size: 13px;
}

.info-item span {
    display: block;
    opacity: 0.8;
    margin-bottom: 2px;
}

.info-item b { font-size: 15px; }

/* Akce */
.btn-secondary {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--card);
    color: var(--primary);
    font-weight: 600;
    font-size: 15px;
    margin-top: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.advanced-toggle {
    text-align: center;
    color: var(--secondary-text);
    font-size: 14px;
    margin-top: 10px;
    cursor: pointer;
    text-decoration: underline;
}

#advanced-panel { display: none; margin-top: 15px; }

</style>
</head>
<body>

<div class="app-container">
    <div class="card">
        <div class="tabs">
            <button class="tab" id="tab-lmp" onclick="setTab('lmp')">LMP</button>
            <button class="tab" id="tab-opu" onclick="setTab('opu')">OPU</button>
            <button class="tab active" id="tab-et" onclick="setTab('et')">ET / KET</button>
        </div>

        <div id="inputs-area"></div>
    </div>

    <div id="result-area"></div>

    <div class="advanced-toggle" onclick="toggleAdvanced()">Pokročilé nastavení</div>
    
    <div id="advanced-panel" class="card">
        <label style="font-size:12px; color:var(--secondary-text)">CRL (mm)</label>
        <input type="number" id="crl" placeholder="Zadejte CRL" oninput="calculate()">
        
        <label style="font-size:12px; color:var(--secondary-text)">GA k jinému datu</label>
        <input type="date" id="customDate" onchange="calculate()">
    </div>
</div>

<script>
let state = {
    mode: 'et',
    date: new Date().toISOString().split('T')[0],
    day: 5
};

function setTab(m) {
    state.mode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${m}`).classList.add('active');
    render();
}

function getZodiac(date) {
    const day = date.getDate();
    const month = date.getMonth() + 1;
    if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "Beran ♈️";
    if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "Býk ♉️";
    if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "Blíženci ♊️";
    if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "Rak ♋️";
    if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "Lev ♌️";
    if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "Panna ♍️";
    if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "Váhy ♎️";
    if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "Štír ♏️";
    if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "Střelec ♐️";
    if ((month == 12 && day >= 22) || (month == 1 && day <= 19)) return "Kozoroh ♑️";
    if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "Vodnář ♒️";
    return "Ryby ♓️";
}

function render() {
    let html = `<input type="date" value="${state.date}" onchange="state.date=this.value; calculate()">`;
    
    if (state.mode === 'et') {
        html += `<div class="days-grid">`;
        [3, 4, 5, 6].forEach(d => {
            html += `<button class="day-btn ${state.day == d ? 'active' : ''}" onclick="state.day=${d}; render()">D${d}</button>`;
        });
        html += `</div>`;
    }
    
    document.getElementById('inputs-area').innerHTML = html;
    calculate();
}

function calculate() {
    let lmp = new Date(state.date);
    if (state.mode === 'opu') lmp.setDate(lmp.getDate() - 14);
    if (state.mode === 'et') lmp.setDate(lmp.getDate() - (14 + state.day));

    const today = new Date();
    const diff = Math.floor((today - lmp) / 86400000);
    const w = Math.floor(diff / 7);
    const d = diff % 7;

    const edd = new Date(lmp);
    edd.setDate(edd.getDate() + 280);
    
    const remaining = Math.floor((edd - today) / 86400000);
    const trim = w < 13 ? "1." : (w < 27 ? "2." : "3.");
    
    // Formátování data
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const eddLong = edd.toLocaleDateString('cs-CZ', options);

    document.getElementById('result-area').innerHTML = `
        <div class="result-card">
            <div class="ga-main">${w}+${d}</div>
            <div class="edd-sub">Termín: ${eddLong}</div>
            
            <div class="info-grid">
                <div class="info-item"><span>Trimestr</span><b>${trim}</b></div>
                <div class="info-item"><span>Zbývá dní</span><b>${remaining > 0 ? remaining : 0}</b></div>
                <div class="info-item"><span>Znamení</span><b>${getZodiac(edd)}</b></div>
                <div class="info-item"><span>Stav</span><b>${remaining < 0 ? 'Po termínu' : 'V očekávání'}</b></div>
            </div>
            
            <button class="btn-secondary" onclick="share('${w}+${d}', '${edd.toLocaleDateString()}')">Sdílet výsledek</button>
        </div>
    `;
}

function share(ga, edd) {
    const text = `Aktuálně jsem v ${ga} tt a termín porodu mám ${edd}. Spočítáno IVF Kalkulačkou.`;
    if (navigator.share) {
        navigator.share({ title: 'Moje těhotenství', text: text });
    } else {
        navigator.clipboard.writeText(text);
        alert('Zkopírováno do schránky!');
    }
}

function toggleAdvanced() {
    const p = document.getElementById('advanced-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

render();
</script>

</body>
</html>
