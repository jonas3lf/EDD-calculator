<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IVF Kalkulačka</title>

<link rel="manifest" href="manifest.json">

<style>
:root{
  --bg:#F2F2F7;
  --card:#FFFFFF;
  --text:#000;
  --secondary:#6B6B6B;
  --accent:#4A7B6F;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, system-ui;
  background:var(--bg);
}

.app{
  max-width:420px;
  margin:auto;
  padding:20px 16px 40px;
}

/* SEGMENT CONTROL */
.tabs{
  display:flex;
  background:#E5E5EA;
  border-radius:12px;
  padding:4px;
  margin-bottom:18px;
}

.tab{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  font-weight:600;
  background:transparent;
  color:var(--secondary);
}

.tab.active{
  background:white;
  color:var(--text);
}

/* INPUT */
input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:18px;
  text-align:center;
  background:var(--card);
  box-shadow:0 1px 2px rgba(0,0,0,0.05);
  margin-bottom:12px;
}

/* DAYS */
.days{
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.days button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#E5E5EA;
  font-weight:500;
}

.days button.active{
  background:var(--accent);
  color:white;
}

/* RESULT */
.result{
  margin-top:20px;
  text-align:center;
}

.ga{
  font-size:64px;
  font-weight:700;
  letter-spacing:-1px;
}

.meta{
  margin-top:8px;
  font-size:16px;
  color:var(--secondary);
}

.meta strong{
  color:var(--text);
}

/* ACTION BUTTONS */
.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:600;
  background:#E5E5EA;
}

.btn.primary{
  background:var(--accent);
  color:white;
}

/* ADVANCED */
.advanced{
  margin-top:20px;
  display:none;
}

.section{
  margin-top:14px;
}

.section label{
  font-size:13px;
  color:var(--secondary);
  display:block;
  margin-bottom:6px;
}

</style>
</head>

<body>
<div class="app">

<div class="tabs">
<button class="tab active" onclick="setTab('lmp')">LMP</button>
<button class="tab" onclick="setTab('opu')">OPU</button>
<button class="tab" onclick="setTab('et')">ET</button>
</div>

<div id="inputs"></div>

<div class="result" id="result"></div>

<div class="actions">
<button class="btn primary" onclick="share()">Sdílet</button>
<button class="btn" onclick="toggleAdvanced()">+</button>
</div>

<div class="advanced" id="advanced">

<div class="section">
<label>GA k datu</label>
<input type="date" id="gaDate">
</div>

<div class="section">
<label>CRL (mm)</label>
<input type="number" id="crl" placeholder="např. 12">
</div>

<div class="section">
<button class="btn" onclick="resetAdvanced()">Reset</button>
</div>

</div>

</div>

<script>

let tab="lmp";

let state={
  lmp:localStorage.lmp || today(),
  opu:localStorage.opu || today(),
  et:localStorage.et || today(),
  day:localStorage.day || 5
};

function today(){
  return new Date().toISOString().split('T')[0];
}

function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function save(){
  localStorage.lmp=state.lmp;
  localStorage.opu=state.opu;
  localStorage.et=state.et;
  localStorage.day=state.day;
}

function render(){

  let html="";

  if(tab==="lmp"){
    html+=`<input type="date" value="${state.lmp}" onchange="state.lmp=this.value;save();render()">`;
  }

  if(tab==="opu"){
    html+=`<input type="date" value="${state.opu}" onchange="state.opu=this.value;save();render()">`;
  }

  if(tab==="et"){
    html+=`<input type="date" value="${state.et}" onchange="state.et=this.value;save();render()">`;

    html+=`<div class="days">`;
    [3,4,5,6].forEach(d=>{
      html+=`<button class="${state.day==d?'active':''}" onclick="state.day=${d};save();render()">D${d}</button>`;
    });
    html+=`</div>`;
  }

  document.getElementById("inputs").innerHTML=html;

  calculate();
}

function calculate(){

  let lmp;

  if(tab==="lmp") lmp=new Date(state.lmp);
  if(tab==="opu"){ lmp=new Date(state.opu); lmp.setDate(lmp.getDate()-14); }
  if(tab==="et"){ lmp=new Date(state.et); lmp.setDate(lmp.getDate()-(14+Number(state.day))); }

  const now=new Date();
  const diff=Math.floor((now-lmp)/86400000);

  const w=Math.floor(diff/7);
  const d=diff%7;

  const edd=new Date(lmp);
  edd.setDate(edd.getDate()+280);

  let extra="";

  const gaDate=document.getElementById("gaDate")?.value;
  if(gaDate){
    const target=new Date(gaDate);
    const diff2=Math.floor((target-lmp)/86400000);
    extra+=`<div class="meta">GA k datu: <strong>${Math.floor(diff2/7)}+${diff2%7}</strong></div>`;
  }

  const crl=document.getElementById("crl")?.value;
  if(crl){
    const ga=Math.round(42 + (Number(crl)*1.2));
    extra+=`<div class="meta">CRL odhad: <strong>${Math.floor(ga/7)}+${ga%7}</strong></div>`;
  }

  document.getElementById("result").innerHTML=`
    <div class="ga">${w}+${d}</div>
    <div class="meta">EDD: <strong>${edd.toLocaleDateString()}</strong></div>
    ${extra}
  `;
}

function share(){
  const text=document.getElementById("result").innerText;
  if(navigator.share){
    navigator.share({text});
  }else{
    navigator.clipboard.writeText(text);
  }
}

function toggleAdvanced(){
  const el=document.getElementById("advanced");
  el.style.display=el.style.display==="block"?"none":"block";
}

function resetAdvanced(){
  document.getElementById("gaDate").value="";
  document.getElementById("crl").value="";
  calculate();
}

render();

// PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

</script>
</body>
</html>
